# ============================================================================
#  profile-assets.yml
#  ----------------------------------------------------------------------------
#  Auto-generates dynamic SVGs for the Londopy profile README.
#
#  Contains TWO independent jobs
#
#    JOB 1 · snake               (Platane/snk)
#       → Generates an animated snake that eats your contribution graph.
#       → Output lives on the `output` branch (auto-created).
#       → README embed:
#           ![snake](https://raw.githubusercontent.com/Londopy/Londopy/output/github-contribution-grid-snake-dark.svg)
#
#    JOB 2 · three-d-contrib     (yoshi389111/github-profile-3d-contrib)
#       → Generates an isometric 3D sculpture of your contribution graph.
#       → Output lives on the `main` branch in `profile-3d-contrib/`.
#       → README embed:
#           ![3D contrib](https://raw.githubusercontent.com/Londopy/Londopy/main/profile-3d-contrib/profile-night-view.svg)
#
#  Both jobs run:
#    • automatically every 24h (cron, midnight UTC)
#    • on manual trigger from the Actions tab
#    • on push to main (so you see results immediately after first commit)
#
#  Permissions needed: contents: write  (set per-job below).
#  No secrets to configure — uses the default GITHUB_TOKEN.
# ============================================================================

name: Generate profile assets

on:
  schedule:
    # Every day at 00:00 UTC. Change the cron if you want a different time.
    - cron: "0 0 * * *"
  workflow_dispatch:        # lets you fire it manually from the Actions tab
  push:
    branches:
      - main

jobs:

  # ==========================================================================
  # JOB 1 · SNAKE  ·  Platane/snk
  # --------------------------------------------------------------------------

  snake:
    name: Generate snake contribution animation
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push the SVG to the `output` branch

    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          # Three outputs: light SVG, dark SVG, optional GIF.
          # Drop any line you don't want.
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9

      - name: Push generated SVGs to the `output` branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # JOB 2 · 3D CONTRIB SCULPTURE  ·  yoshi389111/github-profile-3d-contrib
  # --------------------------------------------------------------------------

  three-d-contrib:
    name: Generate 3D contribution sculpture
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit the SVGs back to main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate 3D contribution SVGs
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME:     ${{ github.repository_owner }}
          # Optional knobs — uncomment to use:
          # MAX_REPOS:    "100"
          # WEEKS:        "53"
          # SETTING_JSON: ".github/profile-3d-settings.json"

      - name: Commit & push the generated SVGs
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add profile-3d-contrib/
          # `|| true` so the job doesn't fail if there are no diffs
          git commit -m "chore(profile): refresh 3D contribution sculpture" || true
          git push

# ============================================================================
#  HOUSEKEEPING
#  ----------------------------------------------------------------------------
#  • First run will fail to push if the repo doesn't exist yet — create
#    `github.com/Londopy/Londopy` first (any commit counts).
#  • The `output` branch is created automatically by the snake job.
#  • If you ever need to wipe and regenerate, just delete `output` branch
#    (snake) or the `profile-3d-contrib/` folder (3D) and re-run.
#  • To change the schedule, edit the `cron:` line under `on:` at the top.
#    Crontab format reminder:  minute hour day-of-month month day-of-week
#  • `Settings → Actions → General → Workflow permissions` must be set to
#    "Read and write permissions" — otherwise the push steps will 403.
# ============================================================================
